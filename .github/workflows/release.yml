name: Release

on:
  push:
    tags:
      - "v*"
      - "test-v*"
  pull_request:
  workflow_dispatch:

permissions: write-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      max-parallel: 4
      fail-fast: true
      matrix:
        arch: [x86_64, aarch64]
        runtime: [none, docker, containerd, incus]
        include:
          - arch: x86_64
            os: ubuntu-latest
          - arch: aarch64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.arch }}-${{ matrix.runtime }}
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Build
        run: |
          make image OS_ARCH=${{ matrix.arch }} RUNTIME=${{ matrix.runtime }}
          ls -lah dist/img

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: img-${{ matrix.arch }}-${{ matrix.runtime }}
          path: dist/img/*-${{ matrix.runtime }}.*
          overwrite: true
          retention-days: 1
          compression-level: 0

